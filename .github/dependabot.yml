version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: typescript
        update-types:
          - version-update:semver-minor
    groups:
      # Build and bundling
      nx:
        patterns:
          - "@nx/*"
          - "nx"
      # Linting and formatting
      eslint:
        patterns:
          - "@eslint/*"
          - "@stylistic/*"
          - "@typescript-eslint/*"
          - "eslint*"
          - "globals"
      # Testing
      vitest:
        patterns:
          - "@vitest/*"
          - "vitest"
      # GraphQL and Apollo
      graphql:
        patterns:
          - "graphql*"
          - "apollo*"
          - "@apollo/*"
      # NestJS ecosystem
      nestjs:
        patterns:
          - "@nestjs/*"
      # Catch-all for other dev dependencies
      other:
        dependency-type: development

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
