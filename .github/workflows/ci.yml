name: CI

on:
  push:
    branches: [main, 'development/[0-9]*.[0-9]*']
    tags-ignore: ['v*']
  pull_request:
    branches: [main, 'development/[0-9]*.[0-9]*']
  workflow_call:

concurrency:
  group: CI-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    env:
      CI: true
      HUSKY: 0
      NX_DAEMON: false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Enable corepack
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Typecheck
        run: yarn typecheck

      - name: Lint
        run: yarn lint

  test:
    name: Test (Node ${{ matrix.node-version }})
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['22', '24']
    env:
      CI: true
      HUSKY: 0
      NX_DAEMON: false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Enable corepack
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Test
        run: yarn test

  build:
    name: Build
    needs: [validate, test]
    runs-on: ubuntu-latest
    env:
      CI: true
      HUSKY: 0
      NX_DAEMON: false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Enable corepack
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build
