name: Publish

on:
  push:
    tags: ['v*']
    branches: ['development/[0-9]*.[0-9]*']
  workflow_dispatch:
    inputs:
      preid:
        description: 'Pre-release identifier'
        required: true
        default: 'dev'
        type: choice
        options: [dev, alpha, beta, rc]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: CI
    # For pre-release tag pushes (tags that contain '-'), CI was already validated
    # by the workflow_dispatch run that created the tag — skip it here.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/heads/') ||
      (startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-'))
    uses: ./.github/workflows/ci.yml

  publish:
    name: Publish
    needs: [ci]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      CI: true
      NX_DAEMON: false
    steps:
      - uses: actions/checkout@v4 # 53c6a6ce9a51b2e87a81ecb51528be3c65f314a4 # v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Enable corepack
        run: corepack enable

      - uses: actions/setup-node@v4 # a8ce42a4a6697706293e562e07d3055dd2b21a8b # v4.1.9
        with:
          node-version: '24'
          cache: 'yarn'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Stamp snapshot version
        if: startsWith(github.ref, 'refs/heads/')
        run: |
          SHA=$(git rev-parse --short HEAD)
          node -e "
            const fs = require('fs');
            const path = require('path');

            // Read all package versions and validate they match
            const versions = new Map();
            for (const d of fs.readdirSync('packages')) {
              const p = path.join('packages', d, 'package.json');
              if (!fs.existsSync(p)) continue;
              const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
              if (pkg.private) continue;
              versions.set(d, pkg.version.replace(/-.*$/, ''));
            }

            // Verify all packages have the same base version
            const uniqueVersions = new Set(versions.values());
            if (uniqueVersions.size !== 1) {
              console.error('ERROR: Package versions do not match:');
              for (const [pkg, ver] of versions) {
                console.error(\`  \${pkg}: \${ver}\`);
              }
              process.exit(1);
            }

            const BASE = Array.from(uniqueVersions)[0];
            const SNAP = BASE + '-dev.' + process.env.SHA;
            console.log('Snapshot version: ' + SNAP);
            process.env.SNAP = SNAP;

            // Stamp all public packages with snapshot version
            for (const d of fs.readdirSync('packages')) {
              const p = path.join('packages', d, 'package.json');
              if (!fs.existsSync(p)) continue;
              const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
              if (pkg.private) continue;
              pkg.version = SNAP;
              fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
            }
          "
          echo "SNAP=${SNAP}" >> $GITHUB_ENV

      - name: Bump pre-release version
        if: github.event_name == 'workflow_dispatch'
        run: npx nx release version prerelease --preid ${{ inputs.preid }} --yes --git-commit --git-tag

      - name: Build all packages
        run: yarn build

      - name: Publish packages
        if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-')
        run: npx nx release publish --parallel=1
        env:
          NPM_CONFIG_PROVENANCE: true
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish dev snapshot
        if: startsWith(github.ref, 'refs/heads/')
        run: npx nx release publish --tag dev --parallel=1
        env:
          NPM_CONFIG_PROVENANCE: true
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish pre-release
        if: github.event_name == 'workflow_dispatch'
        run: npx nx release publish --tag ${{ inputs.preid }} --parallel=1
        env:
          NPM_CONFIG_PROVENANCE: true
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-')
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true

      - name: Push version commit and tag
        if: github.event_name == 'workflow_dispatch'
        run: git push --follow-tags
