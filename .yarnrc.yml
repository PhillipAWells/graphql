nodeLinker: node-modules

# Disable provenance for local/non-CI environments
# NOTE: CI/CD workflows override this with NPM_CONFIG_PROVENANCE=true for proper OIDC signing
enableProvenance: false

logFilters:
  - code: YN0060
    text: "eslint-plugin-import"
    level: discard
  - code: YN0086
    level: discard
  - code: YN0069
    text: "eslint-plugin-import"
    level: discard
